variables:
  UV_VERSION: "0.10.2"
  BASE_LAYER: trixie-slim
  TEST_ALL_TRACES: "1"
  # GitLab CI creates a separate mountpoint for the build directory,
  # so we need to copy instead of using hard links.
  UV_LINK_MODE: copy

uv:
  parallel:
    matrix:
      - PYTHON_VERSION: "3.12"
      - PYTHON_VERSION: "3.13"
      - PYTHON_VERSION: "3.14"
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  script:
    - uv sync --dev
    - uv run pytest -n auto

lint:
  variables:
    PYTHON_VERSION: "3.14"
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER
  script:
    - uv sync --dev
    - uvx ruff check
    - uvx basedpyright
